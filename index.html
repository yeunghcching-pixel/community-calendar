<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬會「聚首壹塘」社區客廳活動月曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        .bg-primary { background-color: #2d4a53; }
        .text-primary { color: #2d4a53; }
        
        /* 活動類別顏色 */
        .bg-at-center { background-color: #2d4a53; color: white; }
        .bg-outside { background-color: #e67e22; color: white; }
        .bg-family { background-color: #d63031; color: white; }
        .bg-regular { background-color: #79c3ba; color: white; } 

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            background-color: #e2e8f0;
            gap: 1px;
            border: 1px solid #e2e8f0;
        }
        
        .day-cell { 
            min-height: 100px; 
            background: white; 
            padding: 4px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.2s;
        }
        .day-cell:active { background-color: #f1f5f9; }

        @media (max-width: 640px) {
            .day-cell { min-height: 70px; }
            .event-label { 
                font-size: 10px !important; 
                padding: 1px 2px !important; 
                margin-top: 1px !important;
                border-radius: 2px !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .day-number { font-size: 14px !important; }
        }

        .day-number {
            font-size: 16px;
            font-weight: 800;
            color: #64748b;
            margin-bottom: 2px;
        }

        .event-label {
            margin-top: 2px;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
            line-height: 1.1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* 今日樣式 */
        .today-cell { background-color: #fff7ed; position: relative; }
        .today-cell::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid #f97316;
            pointer-events: none;
        }

        .modal-animate {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <div class="bg-primary text-white p-6 shadow-lg text-center">
        <h1 class="text-2xl md:text-3xl font-black mb-1">賽馬會「聚首壹塘」社區客廳</h1>
        <p class="text-sm opacity-90 font-bold">3月及4月活動月曆</p>
    </div>

    <!-- Month Switcher -->
    <div class="max-w-4xl mx-auto px-4 mt-6 flex justify-center gap-2">
        <button id="btnMar" onclick="changeMonth(2)" class="px-8 py-3 rounded-full font-black text-xl border-2 border-primary transition-all">3月</button>
        <button id="btnApr" onclick="changeMonth(3)" class="px-8 py-3 rounded-full font-black text-xl border-2 border-primary transition-all">4月</button>
    </div>

    <!-- Legend -->
    <div class="max-w-4xl mx-auto px-4 my-4 flex flex-wrap justify-center gap-3 text-xs font-bold">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-at-center"></span>客廳</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-outside"></span>外出</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-family"></span>親子</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-regular"></span>恆常</span>
    </div>

    <!-- Calendar Container -->
    <div class="max-w-4xl mx-auto shadow-xl border-x border-slate-200">
        <div class="calendar-grid bg-slate-100 text-center font-black text-sm py-2">
            <div class="text-red-500">日</div>
            <div>一</div>
            <div>二</div>
            <div>三</div>
            <div>四</div>
            <div>五</div>
            <div class="text-blue-500">六</div>
        </div>
        <div id="calendarDays" class="calendar-grid"></div>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-4 text-center text-slate-400 text-xs font-medium">
        * 點擊日期可查看當天詳細活動及報名
    </div>

    <!-- 日期活動清單 Modal -->
    <div id="dayModal" class="fixed inset-0 bg-black/60 hidden items-end sm:items-center justify-center z-40 p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden modal-animate max-h-[90vh] flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 id="modalDayTitle" class="text-2xl font-black text-primary"></h2>
                <button onclick="closeDayModal()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-2xl">&times;</button>
            </div>
            <div id="dayEventList" class="p-4 space-y-3 overflow-y-auto">
                <!-- 活動項目會動態插入 -->
            </div>
        </div>
    </div>

    <script>
        const REG_LINK_GENERAL = "https://forms.gle/3XQCVsQdPNvvZDW79";
        const REG_LINK_APR19 = "https://forms.gle/eh6ULHoDEcpQ4GVF6";
        const SOUP_DESC = "「湯開心霏」煲湯組為大家煲時令靚湯✨";

        const today = new Date();
        const todayStr = `2026-0${today.getMonth() + 1}-${String(today.getDate()).padStart(2, '0')}`;

        const activities = [
            // 3月
            { date: '2026-03-19', title: '遊戲攤位', time: '4:30 - 6:00 PM', loc: '社區客廳', target: '所有街坊', desc: '在遊戲中學習歷史物理知識。', type: 'at-center', reg: 'none' },
            { date: '2026-03-19', title: '簡樸房查真啲', time: '8:00 - 9:30 PM', loc: '社區客廳', target: '所有街坊', desc: '簡樸房條例須知。', type: 'at-center', reg: 'link', customLink: 'https://forms.gle/wGqMHZnyirUC8hwX6' },
            { date: '2026-03-23', title: '三高知識工作坊', time: '9:30 - 11:00 AM', loc: '社區客廳', target: '18歲+', desc: '贏取知識拼圖，學食得健康！', type: 'at-center', reg: 'whatsapp' },
            { date: '2026-03-25', title: '選科分享', time: '4:00 - 6:30 PM', loc: '客廳', target: '高小-初中', desc: '中大學生分享。', type: 'at-center', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-03-27', title: '一齊煲湯', time: '3:15 - 5:30 PM', loc: '客廳', target: '街坊', desc: '靚湯分享。', type: 'at-center', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-03-28', title: '1-3月大人生日會', time: '5:00 - 7:30 PM', loc: '客廳', target: '18歲+', desc: '遊戲、慶生、抽獎！', type: 'at-center', reg: 'link', customLink: 'https://forms.gle/rxwNN6qGiztceUGL8' },
            { date: '2026-03-28', title: '中大一日遊', time: '10:15 - 3:45 PM', loc: '中大', target: '親子', desc: '參觀大學環境。', type: 'outside', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-03-29', title: '行山：九逕山', time: '8:30 - 3:30 PM', loc: '屯門', target: '6歲+', desc: '九逕山藍地水塘行程。', type: 'outside', reg: 'link', customLink: 'https://forms.gle/P3MfBsunFMnb7B138' },
            
            // 4月
            { date: '2026-04-01', title: '零食挑戰工作坊', time: '10:00 - 12:00 NN', loc: '客廳', target: '小學生', desc: '營養師帶領。', type: 'at-center', reg: 'link', customLink: 'https://forms.gle/d4TwLgP4bjgcxuCs5' },
            { date: '2026-04-01', title: '貓Cafe！', time: '3:00 - 5:30 PM', loc: '觀塘', target: '街坊', desc: '放鬆心情。', type: 'outside', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-04-01', title: '學習支援', time: '4:00 - 7:00 PM', loc: '客廳', target: '學生', desc: '功課輔導。', type: 'at-center', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-04-01', title: '行沈雲山', time: '3:15 - 5:15 PM', loc: '沈雲山', target: '街坊', desc: '觀塘美景。', type: 'outside', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-04-08', title: '行山食糖水', time: '2:30 - 6:30 PM', loc: '顯徑', target: '街坊', desc: '健康又美味。', type: 'outside', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-04-08', title: '親子一齊玩(1)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子', desc: '親子互動。', type: 'family', reg: 'link', customLink: REG_LINK_GENERAL },
            { date: '2026-04-11', title: 'M+西九野餐', time: '3:30 - 7:00 PM', loc: '西九', target: '街坊', desc: '戶外樂。', type: 'outside', reg: 'link', customLink: REG_LINK_GENERAL },

            // 4月19日
            { date: '2026-04-19', title: '樂聚：製作紀念品', shortTitle: '1.製作紀念品', time: '11:30 - 1:30 PM', loc: '客廳', target: '13歲+', desc: '製作聚餐紀念品。', type: 'at-center', reg: 'link', customLink: REG_LINK_APR19 },
            { date: '2026-04-19', title: '樂聚：製作小食', shortTitle: '2.製作小食', time: '11:30 - 1:30 PM', loc: '客廳', target: '13歲+', desc: '製作聚餐小食。', type: 'at-center', reg: 'link', customLink: REG_LINK_APR19 },
            { date: '2026-04-19', title: '樂聚：惜物共享', shortTitle: '3.惜物共享', time: '10:30 - 1:30 PM', loc: '客廳', target: '全體會員', desc: '惜物共享派對。', type: 'at-center', reg: 'link', customLink: REG_LINK_APR19 },
            { date: '2026-04-19', title: '樂聚：兒童遊戲', shortTitle: '4.兒童遊戲', time: '11:30 - 1:30 PM', loc: '聖若翰堂', target: '4-12歲', desc: '趣味遊戲攤位。', type: 'outside', reg: 'link', customLink: REG_LINK_APR19 },
            { date: '2026-04-19', title: '樂聚：聚餐活動', shortTitle: '5.聚餐活動', time: '1:30 - 2:30 PM', loc: '聖若翰堂', target: '活動參加者', desc: '歡聚午餐。', type: 'outside', reg: 'link', customLink: REG_LINK_APR19 },

            // 恆常
            { date: '2026-03-24', title: '飲湯啦😜', time: '4:30 PM 後', loc: '客廳', target: '會員', desc: SOUP_DESC, type: 'regular', reg: 'none' },
            { date: '2026-04-14', title: '飲湯啦😜', time: '4:30 PM 後', loc: '客廳', target: '會員', desc: SOUP_DESC, type: 'regular', reg: 'none' },
            { date: '2026-04-28', title: '飲湯啦😜', time: '4:30 PM 後', loc: '客廳', target: '會員', desc: SOUP_DESC, type: 'regular', reg: 'none' }
        ];

        // 自動生成每週四、五恆常
        for(let m=2; m<=3; m++) {
            const dMax = new Date(2026, m+1, 0).getDate();
            for(let d=1; d<=dMax; d++) {
                const dt = new Date(2026, m, d);
                const ds = `2026-0${m+1}-${String(d).padStart(2,'0')}`;
                if(dt.getDay() === 4) activities.push({ date: ds, title: '星期四影院', time: '晚上', loc: '客廳', target: '全體', type: 'regular', reg: 'none' });
                if(dt.getDay() === 5) activities.push({ date: ds, title: '健身研習社', time: '9:00 AM', loc: '客廳', target: '18歲+', type: 'regular', reg: 'link', customLink: 'https://wa.me/85297208622' });
            }
        }

        function renderCalendar(monthIdx) {
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';

            document.getElementById('btnMar').className = monthIdx === 2 ? 'px-8 py-3 rounded-full font-black text-xl bg-primary text-white shadow-lg' : 'px-8 py-3 rounded-full font-black text-xl border-2 border-primary text-primary';
            document.getElementById('btnApr').className = monthIdx === 3 ? 'px-8 py-3 rounded-full font-black text-xl bg-primary text-white shadow-lg' : 'px-8 py-3 rounded-full font-black text-xl border-2 border-primary text-primary';

            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) container.innerHTML += '<div class="day-cell bg-slate-50 opacity-40"></div>';

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `2026-0${monthIdx + 1}-${String(d).padStart(2, '0')}`;
                const evts = activities.filter(a => a.date === dateStr);
                const isToday = dateStr === todayStr;

                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'today-cell' : ''}`;
                cell.onclick = () => openDayModal(dateStr, evts);
                
                cell.innerHTML = `<div class="day-number">${d}</div>`;
                
                // 只在格子裡顯示前 2-3 個標籤，避免撐開太長
                evts.slice(0, 3).forEach(e => {
                    const label = document.createElement('div');
                    label.className = `event-label bg-${e.type}`;
                    label.innerText = e.shortTitle || e.title;
                    cell.appendChild(label);
                });

                if(evts.length > 3) {
                    const more = document.createElement('div');
                    more.className = 'text-[9px] font-bold text-slate-400 text-center mt-1';
                    more.innerText = `+${evts.length - 3}`;
                    cell.appendChild(more);
                }
                
                container.appendChild(cell);
            }
        }

        function openDayModal(dateStr, evts) {
            const title = document.getElementById('modalDayTitle');
            const list = document.getElementById('dayEventList');
            
            title.innerText = dateStr.replace('2026-', '') + " 活動清單";
            list.innerHTML = '';

            if(evts.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold">當天暫無安排活動</div>';
            } else {
                evts.forEach(e => {
                    const item = document.createElement('div');
                    item.className = `p-4 rounded-2xl border-l-8 border-${e.type} bg-slate-50`;
                    
                    let actionHtml = '';
                    if(e.reg === 'link') {
                        actionHtml = `<a href="${e.customLink}" target="_blank" class="mt-3 block w-full py-2 bg-orange-500 text-white text-center rounded-xl font-black text-sm">按此報名</a>`;
                    } else if(e.reg === 'whatsapp') {
                        actionHtml = `<div class="mt-3 py-2 bg-green-500 text-white text-center rounded-xl font-black text-sm">請 WhatsApp 報名</div>`;
                    } else {
                        actionHtml = `<div class="mt-3 py-2 bg-slate-300 text-slate-600 text-center rounded-xl font-black text-sm">直接參加</div>`;
                    }

                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-lg text-primary leading-tight">${e.title}</h3>
                        </div>
                        <div class="mt-2 text-sm space-y-1 font-bold text-slate-600">
                            <p>⏰ ${e.time}</p>
                            <p>📍 ${e.loc}</p>
                            <p>👤 ${e.target}</p>
                        </div>
                        ${e.desc ? `<p class="mt-2 text-xs text-slate-500 bg-white p-2 rounded-lg border border-slate-100">${e.desc}</p>` : ''}
                        ${actionHtml}
                    `;
                    list.appendChild(item);
                });
            }

            document.getElementById('dayModal').classList.replace('hidden', 'flex');
        }

        function closeDayModal() {
            document.getElementById('dayModal').classList.replace('flex', 'hidden');
        }

        function changeMonth(m) { renderCalendar(m); }

        window.onclick = (e) => {
            if(e.target == document.getElementById('dayModal')) closeDayModal();
        };

        window.onload = () => {
            renderCalendar(today.getMonth() === 3 ? 3 : 2);
        };
    </script>
</body>
</html>
