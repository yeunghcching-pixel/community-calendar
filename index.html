<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3月社區活動月曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { min-height: 100px; transition: all 0.2s; }
        .event-tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-slate-800">🏠 3月社區客廳活動</h1>
            <p class="text-slate-500 mt-1">點擊活動查看詳情並報名</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="calendar-grid bg-slate-50 border-b border-slate-200">
                <div class="py-3 text-center text-sm font-semibold text-red-500">日</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-600">一</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-600">二</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-600">三</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-600">四</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-600">五</div>
                <div class="py-3 text-center text-sm font-semibold text-slate-400">六</div>
            </div>
            <div id="calendarDays" class="calendar-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="eventModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold text-slate-800"></h3>
                <button onclick="closeModal()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <div class="space-y-3 text-slate-600">
                <p>📅 <span id="modalDate"></span></p>
                <p>⏰ <span id="modalTime"></span></p>
                <div class="p-4 bg-slate-50 rounded-lg"><p id="modalDesc"></p></div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2 border rounded-xl">關閉</button>
                <a id="modalLink" href="#" target="_blank" class="flex-1 px-4 py-2 bg-blue-600 text-white text-center rounded-xl font-medium">立即報名</a>
            </div>
        </div>
    </div>

    <script>
        // 集中管理 3 月活動
        const events = [
            { date: '2026-03-18', title: '造盒，儲物', time: '10 - 11:30 AM', desc: '收納貼士分享，學識將紙袋摺成收納盒。', color: 'bg-orange-100 text-orange-800', link: 'https://wa.me/85297208622?text=%E4%BD%A0%E5%A5%BD%EF%BC%8C%E6%88%91%E6%83%B3%E5%A0%B1%E5%90%8D%E3%80%8C%E9%80%A0%E7%9B%92%EF%BC%8C%E5%84%B2%E7%89%A9%E3%80%8D%E6%B4%BB%E5%8B%95' },
            { date: '2026-03-19', title: '健康生活—運動鍛鍊營養補充', time: '9 - 11:00 AM', desc: '運動過後需要進行哪些食物補充？感覺肌肉痠痛、體態不正如何調養？', color: 'bg-green-100 text-green-800', link: 'https://wa.me/85297208622?text=%E4%BD%A0%E5%A5%BD%EF%BC%8C%E6%88%91%E6%83%B3%E5%A0%B1%E5%90%8D%E3%80%8C%E5%81%A5%E5%BA%B7%E7%94%9F%E6%B4%BB%E3%80%8D%E6%B4%BB%E5%8B%95' },
            { date: '2026-03-19', title: '功樂學習攤位', time: '4:00 - 6:00 PM', desc: '功樂中學哥哥姐姐教大家趣味數學/英語！', color: 'bg-purple-100 text-purple-800', link: 'https://forms.google.com/your-form-2' },
            { date: '2026-03-19', title: '簡樸房查真啲', time: '8:00 - 9:30 PM', desc: '', color: 'bg-yellow-100 text-yellow-800', link: 'https://forms.google.com/your-form-3' },
            { date: '2026-03-26', title: '街坊法律諮詢', time: '19:00 - 21:00', desc: '義務律師解答法律疑問。', color: 'bg-red-100 text-red-800', link: 'https://forms.google.com/your-form-4' }
        ];

        function renderCalendar() {
            const calendarDays = document.getElementById('calendarDays');
            const year = 2026;
            const month = 2; // 3 月在 JS 中是 index 2
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day border-r border-b border-slate-100 bg-slate-50/50';
                calendarDays.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day border-r border-b border-slate-100 p-2 flex flex-col gap-1 hover:bg-slate-50';
                dayDiv.innerHTML = `<span class="text-sm font-medium text-slate-500">${d}</span>`;
                
                events.filter(e => e.date === dateStr).forEach(event => {
                    const tag = document.createElement('div');
                    tag.className = `event-tag ${event.color} font-medium`;
                    tag.innerText = event.title;
                    tag.onclick = (e) => { e.stopPropagation(); openModal(event); };
                    dayDiv.appendChild(tag);
                });
                calendarDays.appendChild(dayDiv);
            }
        }

        function openModal(event) {
            document.getElementById('modalTitle').innerText = event.title;
            document.getElementById('modalDate').innerText = event.date;
            document.getElementById('modalTime').innerText = event.time;
            document.getElementById('modalDesc').innerText = event.desc;
            document.getElementById('modalLink').href = event.link;
            document.getElementById('eventModal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.replace('flex', 'hidden');
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
